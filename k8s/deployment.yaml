---
apiVersion: v1
kind: Namespace
metadata:
  name: soc-assistant
---
apiVersion: v1
kind: Secret
metadata:
  name: soc-secrets
  namespace: soc-assistant
type: Opaque
stringData:
  # Set ONE provider. For Hugging Face (free):
  LLM_PROVIDER: "huggingface"
  HF_API_KEY: ""
  HF_MODEL: "meta-llama/Llama-3.1-8B-Instruct"
  HF_BASE_URL: "https://router.huggingface.co/v1"
  # Or use Claude instead (set LLM_PROVIDER: "claude"):
  ANTHROPIC_API_KEY: ""
  ANTHROPIC_MODEL: "claude-sonnet-4-20250514"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-backend
  namespace: soc-assistant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soc-backend
  template:
    metadata:
      labels:
        app: soc-backend
    spec:
      containers:
        - name: backend
          image: soc-assistant-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: soc-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: soc-backend
  namespace: soc-assistant
spec:
  selector:
    app: soc-backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-frontend
  namespace: soc-assistant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soc-frontend
  template:
    metadata:
      labels:
        app: soc-frontend
    spec:
      containers:
        - name: frontend
          image: soc-assistant-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: soc-frontend
  namespace: soc-assistant
spec:
  type: LoadBalancer
  selector:
    app: soc-frontend
  ports:
    - port: 80
      targetPort: 80
