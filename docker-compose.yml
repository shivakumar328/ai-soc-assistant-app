services:
  backend:
    build: ./backend
    container_name: soc-backend
    ports:
      - "5000:5000"
    environment:
      # --- LLM provider: auto | huggingface | claude | offline ---
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      # Hugging Face (free). Mistral-7B-v0.3 is not on free HF inference right now;
      # default to a working model. See README.
      - HF_API_KEY=${HF_API_KEY:-}
      - HF_MODEL=${HF_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - HF_BASE_URL=${HF_BASE_URL:-https://router.huggingface.co/v1}
      # Claude (optional alternative)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - PORT=5000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: soc-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
